<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DB Wizard | Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand-wrap">
          <div class="brand-badge">DB</div>
          <div>
            <h1>Connection Dashboard</h1>
            <p class="muted">Manage data sources and launch SQL workspaces</p>
          </div>
        </div>
        <div class="header-actions">
          <span id="user-chip" class="chip"></span>
          <button id="logout-btn" class="secondary">Logout</button>
        </div>
      </header>

      <section class="stat-grid">
        <div class="stat-card">
          <div class="label">Supported Engines</div>
          <div class="value">3</div>
        </div>
        <div class="stat-card">
          <div class="label">Read-only Guard</div>
          <div class="value">Enabled</div>
        </div>
        <div class="stat-card">
          <div class="label">Workspace Mode</div>
          <div class="value">Enterprise</div>
        </div>
      </section>

      <p id="error" class="error hidden"></p>

      <section class="panel connection-panel">
        <h2>Add Connection</h2>
        <form id="connection-form" class="grid two-col">
          <label>Connection Name<input name="name" required /></label>
          <label>Engine
            <select name="engine" required>
              <option value="postgresql">PostgreSQL</option>
              <option value="mysql">MySQL</option>
              <option value="mssql">MSSQL</option>
            </select>
          </label>
          <label class="full">Connection String<input name="connection_string" placeholder="postgresql://user:pass@host:5432/db" /></label>
          <p class="full muted">Or provide individual server credentials.</p>
          <label>Server<input name="server" /></label>
          <label>Port<input name="port" /></label>
          <label>Database<input name="database_name" /></label>
          <label>DB Username<input name="db_username" /></label>
          <label class="full">DB Password<input type="password" name="db_password" /></label>
          <button class="full" type="submit">Save Connection</button>
        </form>
      </section>

      <section class="panel">
        <h2>Your Connections</h2>
        <ul id="connection-list" class="nav-list"></ul>
      </section>
    </div>

    <script src="/client/shared.js"></script>
    <script src="/client/dashboard.js"></script>
  </body>
</html>
