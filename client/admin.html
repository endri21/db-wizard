<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DB Wizard | Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell portal-shell">
      <header class="app-header portal-header">
        <div class="brand-wrap">
          <div class="brand-badge">DB</div>
          <div>
            <h1>Admin Console</h1>
            <p class="muted">Manage users, roles, and connection limits</p>
          </div>
        </div>
        <div class="header-actions">
          <a href="/dashboard" class="button secondary">Back to Dashboard</a>
          <span id="user-chip" class="chip"></span>
          <button id="logout-btn" class="secondary">Logout</button>
        </div>
      </header>

      <main class="panel portal-content portal-content-full">
        <div class="portal-section-header section-actions">
          <div>
            <h2>Users</h2>
            <p class="muted">Assign role and maximum number of database workspaces per user.</p>
          </div>
        </div>

        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Provider</th>
                <th>Role</th>
                <th>Current DBs</th>
                <th>Max DBs</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="admin-user-tbody"></tbody>
          </table>
        </div>
      </main>
    </div>

    <script src="/client/shared.js"></script>
    <script src="/client/admin.js"></script>
  </body>
</html>
