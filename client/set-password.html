<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DB Wizard | Set Password</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="login-simple-page">
    <main class="login-simple-wrap">
      <section class="panel login-simple-card" style="grid-template-columns:1fr; max-width:560px; margin:0 auto;">
        <div class="login-simple-form">
          <h2>Set your password</h2>
          <p id="setup-user-hint" class="muted">Validating your invite link…</p>
          <form id="set-password-form" class="hidden">
            <label>New Password<input id="new-password" type="password" minlength="8" required /></label>
            <label>Confirm Password<input id="confirm-password" type="password" minlength="8" required /></label>
            <button type="submit">Save Password</button>
          </form>
        </div>
      </section>
    </main>

    <script src="/client/shared.js"></script>
    <script src="/client/set-password.js"></script>
  </body>
</html>
