<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DB Wizard | Confirm Email</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="login-simple-page">
    <main class="login-simple-wrap">
      <section class="panel login-simple-card" style="grid-template-columns:1fr; max-width:560px; margin:0 auto;">
        <div class="login-simple-form">
          <h2>Confirm your email</h2>
          <p id="confirm-email-hint" class="muted">Validating confirmation link…</p>
          <button id="confirm-email-btn" class="hidden" type="button">Confirm Email</button>
        </div>
      </section>
    </main>

    <script src="/client/shared.js"></script>
    <script src="/client/confirm-email.js"></script>
  </body>
</html>
