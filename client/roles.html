<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DB Wizard | Roles</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-frame">
      <aside class="side-nav">
        <div class="side-nav-brand">DB Wizard</div>
        <nav class="side-nav-links">
          <a class="side-link" href="/dashboard">Dashboard</a>
          <a class="side-link" href="/users">Users</a>
          <a class="side-link active" href="/roles">Roles</a>
        </nav>
      </aside>

      <div class="app-shell portal-shell">
        <header class="app-header portal-header">
          <div class="brand-wrap">
            <div class="brand-badge">DB</div>
            <div>
              <h1>Role Management</h1>
              <p class="muted">Create and maintain available user roles</p>
            </div>
          </div>
          <div class="header-actions">
            <span id="user-chip" class="chip"></span>
            <button id="logout-btn" class="secondary">Logout</button>
          </div>
        </header>

        <main class="panel portal-content portal-content-full">
          <p id="forbidden-text" class="warning-text hidden">Admin access required to manage roles.</p>
          <div id="roles-panel" class="hidden">
            <section class="panel" style="margin-bottom:.9rem;">
              <h3 style="margin-top:0;">Create Role</h3>
              <form id="create-role-form" class="actions-row">
                <label style="min-width:280px;">Role Name<input id="new-role-name" required placeholder="e.g. analyst" /></label>
                <button type="submit">Create Role</button>
              </form>
              <p class="muted" style="margin:.35rem 0 0;">Allowed chars: letters, numbers, <code>_</code>, <code>-</code>.</p>
            </section>

            <div class="table-scroll">
              <table>
                <thead>
                  <tr><th>Role</th><th>Users</th><th>Created</th><th>Actions</th></tr>
                </thead>
                <tbody id="roles-tbody"></tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="/client/shared.js"></script>
    <script src="/client/roles.js"></script>
  </body>
</html>
