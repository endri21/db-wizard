<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DB Wizard | Login</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <div class="auth-topbar">
          <div class="brand-wrap">
            <div class="brand-badge">DB</div>
            <div>
              <h1>DB Wizard</h1>
              <p class="muted">Modern database access for teams</p>
            </div>
          </div>
          <span class="chip">Secure Workspace</span>
        </div>

        <p id="error" class="error hidden"></p>

        <div class="auth-grid">
          <section class="panel">
            <h2>Sign in</h2>
            <p class="muted">Access your connections and SQL workspace.</p>
            <form id="login-form">
              <label>Username<input name="username" required /></label>
              <label>Password<input type="password" name="password" required /></label>
              <button type="submit">Login</button>
            </form>
          </section>

          <section class="panel">
            <h2>Create account</h2>
            <p class="muted">Create a local account in seconds.</p>
            <form id="register-form">
              <label>Username<input name="username" required /></label>
              <label>Password<input type="password" name="password" required /></label>
              <button type="submit" class="secondary">Register</button>
            </form>
          </section>
        </div>

        <section class="panel">
          <h2>Organization Login</h2>
          <p class="muted">Use Google, GitHub, or Azure AD when configured.</p>
          <div id="oauth-buttons" class="oauth-buttons"></div>
        </section>
      </div>
    </div>

    <script src="/client/shared.js"></script>
    <script src="/client/login.js"></script>
  </body>
</html>
